{{ define "main" }}
  {{ $page := . }}
  {{ $ordered := $page.Pages.ByDate.Reverse }}
  {{ $pager := $page.Paginate $ordered }}

  <div id="paige-pages">
    {{ range $pager.Pages }}
      {{ partial "paige/list-item-bigimage.html" . }}
    {{ end }}
  </div>

  {{ template "pagination" (dict "page" $page "pager" $pager) }}
{{ end }}
